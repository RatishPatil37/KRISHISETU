version: '3.8'

services:
  krishisetu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krishisetu-app
    ports:
      - "5000:5000"
    env_file:
      - LokSevaAI_MERN/backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
